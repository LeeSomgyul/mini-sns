user                 nginx; 
worker_processes     auto;
worker_rlimit_nofile 65535;

events {
    multi_accept       on;
    worker_connections 65535; # 동시 연결 65535개 가능
}

http {
    charset                utf-8;
    sendfile               on; # 이미지 전송 속도를 극대화하는 커널 전송 기술
    tcp_nopush             on;
    tcp_nodelay            on;
    server_tokens          off; # Nginx 버전을 숨겨 해커의 스캔을 방지하는 보안 옵션
    client_max_body_size   16M; # 이미지 업로드 제한 용량 지정

    include                mime.types;
    default_type           application/octet-stream;

    # [Gzip] 텍스트 압축 설정 적용
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # [imgproxy] 미디어 캐시 창고 설정
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=img_cache:10m max_size=1g inactive=60m use_temp_path=off;

    server {
        listen 80;
        server_name localhost;

        # 에러 로그 출력    
        error_log  /var/log/nginx/error.log debug;

        # 0. 개발 중에 아래 경로 제외하는 모든 요청은 리액트 개발 서버로 전송
        location / {
            proxy_pass http://host.docker.internal:5173; # 리액트 Vite 개발 서버로 전달
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # -------------------------------------------------------------
        # [1. USER 모듈 전용 통로 - 8081 포트]
        # -------------------------------------------------------------
        # 프론트가 /api/v1/auth나 /api/v1/users로 보낸 요청을 8081로 배달합니다.
        location ~ ^/api/v1/(auth|users) {
            proxy_pass http://host.docker.internal:8081; 
            proxy_cache off;                                      
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # -------------------------------------------------------------
        # [2. POST 모듈 전용 통로 - 8082 포트]
        # -------------------------------------------------------------
        # 프론트가 /api/v1/posts 나 /api/v1/media 등으로 보낸 요청을 8082로 배달합니다.
        location ~ ^/api/v1/(posts|media) {
            proxy_pass http://host.docker.internal:8082; 
            proxy_cache off;                                      
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. 실시간 알림(SSE) 전용 통로
        # - location: 프론트엔드에서 쏘는 주소
        # - proxy_pass: 백엔드에서 실행되는 주소
        location /api/v1/notifications/connect {
            #🚨배포 시 변경🚨
            proxy_pass http://host.docker.internal:8080/v1/notifications/connect;

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            proxy_buffering off;        
            proxy_cache off;            
            proxy_set_header Connection ''; 
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # 4. imgproxy 이미지 가공 및 캐싱 경로
        location /insecure/ {
            proxy_pass http://imgproxy:8080;

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;

            proxy_cache img_cache;
            proxy_cache_valid 200 302 60m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}