server:
  port: 8082  # Post API 서버는 8082 포트로 독립 가동

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/post_db
    username: minisns_admin
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

minio:
  endpoint: http://localhost:9000
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucket: mini-sns
  default-image: /minio/mini-sns-default/default_loading_image.png