spring:
  datasource:
    # localhost:5432 => 내 컴퓨터에서 도커로 연결되는 통로
    url: jdbc:postgresql://localhost:5432/sns_db
    username: dev_user
    password: password123
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.naver.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.naver.com
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 120MB
      max-request-size: 150MB
jwt:
  secret: ${JWT_SECRET}
kakao:
  client-id: ${KAKAO_RESTAPI_KEY}
  redirect-uri: ${KAKAO_REDIRECT_URI}
file:
  upload-dir: C:/mini-sns-uploads/