server:
  port: 8081  # User API 서버는 8081 포트로 독립 가동
  servlet:
    context-path: /api

spring:
  profiles:
    active: local #현재 서버를 local 모드로 켜겠다는 선언
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: minisns_admin
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.naver.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.naver.com
          starttls:
            enable: true
  kafka:
    bootstrap-servers: localhost:9094
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

minio:
  endpoint: http://localhost:9000
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucket: mini-sns

jwt:
  secret: ${JWT_SECRET}

kakao:
  client-id: ${KAKAO_RESTAPI_KEY}
  redirect-uri: ${KAKAO_REDIRECT_URI}

# user-module에서 보안 검사 안하는 허용 경로
api:
  security:
    permit-urls:
      - "/v1/auth/login"
      - "/v1/auth/join"
      - "/v1/auth/email/send"
      - "/v1/auth/email/verify"
      - "/v1/auth/reissue"
      - "/v1/auth/kakao"
      - "/v1/users/nickname/exists"