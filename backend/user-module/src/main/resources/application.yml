server:
  port: 8081  # User API 서버는 8081 포트로 독립 가동

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: minisns_admin
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.naver.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.naver.com
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

jwt:
  secret: ${JWT_SECRET}

kakao:
  client-id: ${KAKAO_RESTAPI_KEY}
  redirect-uri: ${KAKAO_REDIRECT_URI}

# user-module에서 보안 검사 안하는 허용 경로
api:
  security:
    permit-urls:
      - "/v1/auth/login"
      - "/v1/auth/join"
      - "/v1/auth/email/send"
      - "/v1/auth/email/verify"
      - "/v1/auth/reissue"
      - "/v1/auth/kakao"
      - "/v1/users/nickname/exists"