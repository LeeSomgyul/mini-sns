version: '3.8'
services:
  db:
    image: postgres:16
    container_name: sns-db-container
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sns_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
  sns-redis:
    image: redis:latest
    container_name: minisns-redis
    ports:
      - "6379:6379"
    restart: always
  minio:
    image: minio/minio
    container_name: minisns-minio
    ports:
      - "9000:9000"       # API 통신용 (자바가 쓸 포트)
      - "9001:9001"       # 관리자 화면용 (내가 볼 화면)
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data  