version: '3.8'
services:
  db:
    image: postgres:16
    container_name: sns-db-container
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sns_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
  sns-redis:
    image: redis:latest
    container_name: minisns-redis
    ports:
      - "6379:6379"
    restart: always